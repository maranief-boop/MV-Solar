<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MV Solar CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0f172a;
      padding: 20px;
    }
    .login-box {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px; padding: 48px 40px;
      width: 100%; max-width: 420px;
      text-align: center;
    }
    .login-box .logo-img { height: 60px; margin-bottom: 8px; }
    .login-box h1 { color: #fff; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .login-box p { color: #64748b; font-size: 0.88rem; margin-bottom: 32px; }
    .login-box .form-group { margin-bottom: 20px; text-align: left; }
    .login-box label { display: block; color: #94a3b8; font-size: 0.82rem; margin-bottom: 6px; font-weight: 500; }
    .login-box input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: #fff; font-size: 0.92rem; outline: none;
      font-family: 'Inter', sans-serif; transition: border-color 0.3s;
    }
    .login-box input:focus { border-color: #f97316; }
    .login-box .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #f97316, #ea580c); color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: transform 0.3s;
    }
    .login-box .btn:hover { transform: translateY(-2px); }
    .login-box .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }
    .login-footer { margin-top: 24px; font-size: 0.78rem; color: #475569; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <img src="../logo.png" alt="MV Solar" class="logo-img" />
      <h1>MV Solar CRM</h1>
      <p>Faça login para gerenciar seus leads</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>
      <div class="login-footer">
        <i class="fas fa-shield-alt"></i> Ambiente seguro
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
